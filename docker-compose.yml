# =============================================================================
# Rare Disease Diagnostic Agent -- Docker Compose (Standalone)
# HCLS AI Factory / ai_agent_adds / rare_disease_diagnostic_agent
#
# Standalone deployment with its own Milvus instance.
# For integrated deployment, use the top-level docker-compose.dgx-spark.yml
# which connects to the shared Milvus instance.
#
# Services:
#   milvus-etcd          etcd key-value store for Milvus metadata
#   milvus-minio         MinIO object storage for Milvus log/index data
#   milvus-standalone    Milvus 2.4 vector database (ports 49530, 49091)
#   rd-streamlit         Streamlit diagnostic UI (port 8544)
#   rd-api               FastAPI REST server (port 8134)
#   rd-setup             One-shot: create collections + seed all data
#
# Usage:
#   cp .env.example .env          # add ANTHROPIC_API_KEY
#   docker compose up -d          # start all services
#   docker compose logs -f rd-setup  # watch seed progress
#
# Author: Adam Jones
# Date:   March 2026
# =============================================================================

version: "3.8"

services:
  # -- etcd (Milvus metadata store) ------------------------------------------
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rd-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
      - --auto-compaction-mode=revision
      - --auto-compaction-retention=1000
      - --snapshot-count=50000
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - rd-network
    restart: unless-stopped

  # -- MinIO (Milvus object storage) -----------------------------------------
  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: rd-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - rd-network
    restart: unless-stopped

  # -- Milvus Standalone ------------------------------------------------------
  milvus-standalone:
    image: milvusdb/milvus:v2.4-latest
    container_name: rd-milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "49530:19530"
      - "49091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - rd-network
    restart: unless-stopped

  # -- Rare Disease Streamlit UI ----------------------------------------------
  rd-streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rd-streamlit
    ports:
      - "8544:8544"
    environment:
      RD_MILVUS_HOST: milvus-standalone
      RD_MILVUS_PORT: "19530"
      RD_STREAMLIT_PORT: "8544"
      RD_API_BASE: "http://rd-api:8134"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      milvus-standalone:
        condition: service_healthy
    networks:
      - rd-network
    restart: unless-stopped

  # -- Rare Disease FastAPI Server --------------------------------------------
  rd-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rd-api
    ports:
      - "8134:8134"
    environment:
      RD_MILVUS_HOST: milvus-standalone
      RD_MILVUS_PORT: "19530"
      RD_API_PORT: "8134"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command:
      - uvicorn
      - api.main:app
      - --host=0.0.0.0
      - --port=8134
      - --workers=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8134/health"]
      interval: 30s
      timeout: 10s
      start-period: 30s
      retries: 3
    depends_on:
      milvus-standalone:
        condition: service_healthy
    networks:
      - rd-network
    restart: unless-stopped

  # -- Rare Disease Setup (one-shot: create collections + seed data) ----------
  rd-setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rd-setup
    environment:
      RD_MILVUS_HOST: milvus-standalone
      RD_MILVUS_PORT: "19530"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: >
      bash -c "
        echo '===== RD Setup: Creating collections =====' &&
        python scripts/setup_collections.py --drop-existing --seed &&
        echo '===== Seeding knowledge base =====' &&
        python scripts/seed_knowledge.py &&
        echo '===== RD Setup complete! ====='
      "
    depends_on:
      milvus-standalone:
        condition: service_healthy
    networks:
      - rd-network
    restart: "no"

# -- Volumes ------------------------------------------------------------------
volumes:
  etcd_data:
    driver: local
  minio_data:
    driver: local
  milvus_data:
    driver: local

# -- Network ------------------------------------------------------------------
networks:
  rd-network:
    name: rd-network
    driver: bridge
